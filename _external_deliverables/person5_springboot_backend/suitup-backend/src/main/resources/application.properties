# ===================================================================
# CONFIGURAÇÃO GERAL DO SPRING BOOT DE DESENVOLVIMENTO
# ===================================================================
spring.application.name=suitup-backend

# Porta do Servidor Web do Backend
server.port=8080

# ===================================================================
# CONEXÃO COM A BASE DE DADOS POSTGRESQL (Ajustável no ambiente local)
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/suitup_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# CONFIGURAÇÕES DO HIBERNATE & JPA ORM
# ===================================================================
# Atualiza automaticamente o esquema a partir das classes Java anotadas com @Entity. Exige base 'suitup_db' criada.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===================================================================
# LIMITES EXCLUSIVOS DE CAPTURA MULTIPART (Upload de Comprovativos)
# ===================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================================================================
# DIRETÓRIOS EXCLUSIVOS DE PERSISTÊNCIA FÍSICA NO DISCO DO SERVIDOR
# ===================================================================
suitup.upload-dir=uploads/payment-proofs
