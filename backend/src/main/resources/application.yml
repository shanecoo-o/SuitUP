server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: suitup-backend
  profiles:
    default: local
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:suitup_db}
    username: ${DB_USER:suitup_user}
    password: ${DB_PASSWORD:suitup_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    placeholders:
      seedDev: ${SEED_DEV:false}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    org.hibernate.SQL: WARN
    org.flywaydb: INFO

app:
  security:
    jwt:
      secret: ${JWT_SECRET:}
      access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:15}
      refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:14}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:}
