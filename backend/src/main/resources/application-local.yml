spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    placeholders:
      seedDev: ${SEED_DEV:true}

logging:
  level:
    org.hibernate.SQL: DEBUG

app:
  security:
    jwt:
      secret: ${JWT_SECRET:suitup-local-only-secret-change-before-production-2026}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081}
