</div>

<span class="font-label-sm text-label-sm">Pedidos</span>
</div>

</div>

<script>
        // Micro-interactions for selections
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('click', function() {
                // Haptic feedback simulation
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(5);
                }
            });
        });

        // Price Update Animation
        function triggerPriceUpdate() {
            const priceEl = document.getElementById('price-value');
            priceEl.classList.remove('animate-priceUpdate');
            void priceEl.offsetWidth; // trigger reflow
            priceEl.classList.add('animate-priceUpdate');
        }

        // Color selector interaction
        const colorCircles = document.querySelectorAll('.rounded-full.w-12');
        colorCircles.forEach(circle => {
            circle.addEventListener('click', function() {
                colorCircles.forEach(c => {
                    c.classList.remove('active-ring', 'ring-offset-4', 'ring-offset-background');
                    c.classList.add('border-transparent');
                    c.classList.remove('border-primary');
                });
                this.classList.add('active-ring', 'ring-offset-4', 'ring-offset-background', 'border-primary');
                this.classList.remove('border-transparent');
                triggerPriceUpdate();
            });
        });

        // Lapel selector interaction
        const lapelBtns = document.querySelectorAll('.lapel-style-btn');
        lapelBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                lapelBtns.forEach(b => {
                    b.classList.remove('bg-primary/20', 'border-primary/50', 'active', 'scale-105');
                    b.classList.add('border-transparent', 'scale-100');
                    b.querySelector('span:first-child').classList.remove('text-primary');
                    b.querySelector('span:first-child').classList.add('text-on-surface-variant');
                    b.querySelector('span:last-child').classList.remove('text-primary');
                    b.querySelector('span:last-child').classList.add('text-on-surface-variant');
                });
                this.classList.add('bg-primary/20', 'border-primary/50', 'active', 'scale-105');
                this.classList.remove('border-transparent', 'scale-100');
                this.querySelector('span:first-child').classList.add('text-primary');
                this.querySelector('span:first-child').classList.remove('text-on-surface-variant');
                this.querySelector('span:last-child').classList.add('text-primary');
                this.querySelector('span:last-child').classList.remove('text-on-surface-variant');
                triggerPriceUpdate();
            });
        });
    </script>
