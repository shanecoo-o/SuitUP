</header>
<!-- Form Section -->
<div class="w-full space-y-lg mt-xl">
<div class="space-y-xs">
<h2 class="font-headline-md text-headline-md text-on-surface">Bem-vindo de volta</h2>
<p class="font-body-md text-on-surface-variant">Inicie sessão para continuar a sua experiência personalizada.</p>
</div>
<form class="space-y-md" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="relative">

<span class="material-symbols-outlined absolute right-xs top-1/2 -translate-y-1/2 text-on-surface-variant/40 group-focus-within:text-primary transition-colors">alternate_email</span>
</div>
</div>
<!-- Password Input -->
<div class="relative">
<label class="font-label-lg text-label-lg text-on-surface-variant/70 ml-1" for="password">Palavra-passe</label>
<div class="mt-xs group relative">
<input class="w-full bg-surface-container-low border-b border-outline/30 focus:border-primary px-xs py-md text-on-surface outline-none transition-all duration-300 placeholder:text-on-surface-variant/30" id="password" name="password" placeholder="••••••••" type="password"/>

</div>
</div>

<div class="flex justify-end">

<!-- Interactive script for visuals -->
<script>
        // Subtle move effect on inputs
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Toggle password visibility interaction
        const passToggle = document.querySelector('button.material-symbols-outlined');
        const passInput = document.getElementById('password');
        passToggle.addEventListener('click', () => {
            if (passInput.type === 'password') {
                passInput.type = 'text';
                passToggle.textContent = 'visibility_off';
            } else {
                passInput.type = 'password';
                passToggle.textContent = 'visibility';
            }
        });
    </script>
