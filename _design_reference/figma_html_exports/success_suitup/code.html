<style>
        .glow-effect {
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.15);
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.1); }
            50% { box-shadow: 0 0 60px rgba(212, 175, 55, 0.25); }
            100% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.1); }
        }
        .animate-glow {
            animation: pulse-glow 3s infinite ease-in-out;
        }
        @keyframes drawCheck {
            0% { stroke-dashoffset: 100; opacity: 0; }
            10% { opacity: 1; }
            100% { stroke-dashoffset: 0; opacity: 1; }
        }
        .check-anim {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawCheck 1.5s ease-out forwards;
            animation-delay: 0.2s;
        }
        
        .confetti-piece {
            position: absolute;
            width: 8px;
            height: 16px;
            background: #d4af37;
            top: -20px;
            opacity: 0;
        }
        @keyframes fall {
            0% { top: -20px; transform: rotate(0deg) scale(1); opacity: 1; }
            100% { top: 100vh; transform: rotate(360deg) scale(0.5); opacity: 0; }
        }
    </style>

<script>
        // Simple confetti effect
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById('confetti-container');
            const colors = ['#d4af37', '#eebd8e', '#dfaf81', '#393939'];
            
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti-piece');
                
                // Randomize properties
                const left = Math.random() * 100;
                const width = Math.random() * 6 + 4;
                const height = Math.random() * 12 + 8;
                const color = colors[Math.floor(Math.random() * colors.length)];
                const animationDuration = Math.random() * 3 + 2;
                const animationDelay = Math.random() * 2;
                
                confetti.style.left = `${left}%`;
                confetti.style.width = `${width}px`;
                confetti.style.height = `${height}px`;
                confetti.style.backgroundColor = color;
                confetti.style.animation = `fall ${animationDuration}s linear ${animationDelay}s forwards`;
                
                container.appendChild(confetti);
            }
        });
    </script>
